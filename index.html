        function htmlToExcelRichText(htmlString) {
            if (!htmlString) return '';
            const wrapper = document.createElement('div');
            wrapper.innerHTML = htmlString;
            const richTextArray = [];

            function parseNode(node, currentFont) {
                if (node.nodeType === 3) { 
                    if (node.textContent) richTextArray.push({ text: node.textContent, font: { ...currentFont } });
                } else if (node.nodeType === 1) { 
                    const font = { ...currentFont };
                    
                    if (node.tagName === 'B' || node.tagName === 'STRONG' || node.style.fontWeight === 'bold' || parseInt(node.style.fontWeight) >= 600) {
                        font.bold = true;
                    }
                    if (node.tagName === 'FONT' && node.color) {
                        font.color = { argb: 'FF' + node.color.replace('#', '').toUpperCase() };
                    }
                    if (node.style.color) {
                        let match = node.style.color.match(/\d+/g);
                        if (match && match.length >= 3) {
                            const hex = match.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('').toUpperCase();
                            font.color = { argb: 'FF' + hex };
                        }
                    }

                    if (node.tagName === 'DIV' || node.tagName === 'P') {
                        if (richTextArray.length > 0 && richTextArray[richTextArray.length-1].text !== '\n') {
                            richTextArray.push({ text: '\n', font: { ...currentFont } });
                        }
                    }
                    if (node.tagName === 'BR') {
                        richTextArray.push({ text: '\n', font: { ...currentFont } });
                    }

                    node.childNodes.forEach(child => parseNode(child, font));
                }
            }
            parseNode(wrapper, {});
            return richTextArray.length > 0 ? { richText: richTextArray } : '';
        }

        // 將任意圖片來源(PNG/JPG/SVG皆可)重新繪製為真正的PNG點陣圖，
        // 避免「宣告格式與實際內容不符」導致Excel開啟時判定檔案損毀、格式跑掉
        function toPngDataUrl(dataUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth || img.width || 1;
                    canvas.height = img.naturalHeight || img.height || 1;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve({ dataUrl: canvas.toDataURL('image/png'), width: canvas.width, height: canvas.height });
                };
                img.onerror = () => reject(new Error('圖片讀取失敗'));
                img.src = dataUrl;
            });
        }

        // --- Excel 圖片配置工具：統一處理「等比縮放 + 置中」，避免不同尺寸的LOGO/示意圖開啟時跑版變形 ---
        const XLS_CHAR_PX = 7;         // Calibri 11 預設，每一欄寬字元單位約略對應的像素寬
        const XLS_PT_PER_PX = 0.75;    // 1px ≈ 0.75pt（96dpi 換算）
        const XLS_COLA_PX = 15 * XLS_CHAR_PX; // A欄實際字元寬(15) 換算出的像素寬，做為欄位偏移換算基準
        const XLS_AREA_PX = 93 * XLS_CHAR_PX; // A:E 合併區域總字元寬(15+15+3+30+30=93) 換算出的像素寬

        // 依方框(maxW x maxH)等比縮小/放大圖片，永遠維持原始寬高比，絕不拉伸變形
        function xlsFitBox(imgW, imgH, maxW, maxH, maxUpscale = 3) {
            let scale = Math.min(maxW / imgW, maxH / imgH);
            scale = Math.min(scale, maxUpscale); // 避免過小的圖片被放大過頭而模糊
            return { w: imgW * scale, h: imgH * scale };
        }
        // 計算讓圖片在指定寬度的區域內「水平置中」所需要的欄位偏移量(ExcelJS的col為 欄位索引.該欄內的比例)
        function xlsCenterColOffset(itemW, areaPx = XLS_AREA_PX) {
            return Math.max(0, (areaPx - itemW) / 2) / XLS_COLA_PX;
        }

        // 把目前畫面上示意圖框內「多張圖片的最終拖曳/縮放結果」直接拍成一張合成PNG，
        // 這樣Excel匯出時只要放這一張圖就好，不用在Excel裡重新計算每張圖各自的座標，畫面所見即所得
        async function captureImgAreaSnapshot() {
            const boxEl = document.querySelector('.sheet .img-area');
            if (!boxEl || imgList.length === 0) return null;
            document.body.classList.add('exporting');
            try {
                const prevTransform = boxEl.closest('.sheet').style.transform;
                boxEl.closest('.sheet').style.transform = 'none';
                const canvas = await html2canvas(boxEl, { backgroundColor: '#ffffff', scale: 2, useCORS: true });
                boxEl.closest('.sheet').style.transform = prevTransform;
                return canvas.toDataURL('image/png');
            } finally {
                document.body.classList.remove('exporting');
            }
        }

        async function exportToExcel() {
            const wb = new ExcelJS.Workbook(); const ws = wb.addWorksheet('製單');
            ws.pageSetup = { paperSize: 9, orientation: 'portrait', fitToPage: true, fitToWidth: 1, fitToHeight: 0, horizontalCentered: true, margins: { left: 0.25, right: 0.25, top: 0.5, bottom: 0.5, header: 0.3, footer: 0.3 } };
            ws.columns = [{width:15}, {width:15}, {width:3}, {width:30}, {width:30}];

            const getS = (idC, idB) => ({ argb: document.getElementById(idC).value.replace('#','FF'), bold: document.getElementById(idB).checked });
            const sTitle = getS('cTitle', 'bTitle'); const sHead = getS('cHeader', 'bHeader'); const sDet = getS('cDetail', 'bDetail'); const sFoot = getS('cFooter', 'bFooter');

            if (logoData) {
                const logoPng = await toPngDataUrl(logoData);
                // LOGO 方框固定為寬160 x 高55，不論原圖多大/多長都等比縮放進這個框，並水平置中，保留列高與方框一致，避免與標題重疊或跑版
                const LOGO_BOX_W = 160, LOGO_BOX_H = 55, LOGO_ROWS = 3;
                const { w, h } = xlsFitBox(logoPng.width, logoPng.height, LOGO_BOX_W, LOGO_BOX_H);
                const colOffset = xlsCenterColOffset(w);
                const logoId = wb.addImage({ base64: logoPng.dataUrl, extension: 'png' });
                ws.addImage(logoId, { tl: { col: colOffset, row: 0.1 }, ext: { width: w, height: h }, editAs: 'oneCell' });
                const logoRowHeightPt = (LOGO_BOX_H * XLS_PT_PER_PX) / LOGO_ROWS;
                for (let i = 0; i < LOGO_ROWS; i++) { const r = ws.addRow([]); r.height = logoRowHeightPt; }
            }

            const r1 = ws.addRow([document.getElementById('vTitle').value + (document.getElementById('vYear').value || '')]); ws.mergeCells(`A${r1.number}:E${r1.number}`); r1.height = 35;
            r1.font = { size: 20, bold: sTitle.bold, color: { argb: sTitle.argb } }; r1.alignment = { horizontal: 'center', vertical: 'middle' };

            const packagingVal = getPackagingValue();
            [
                ['版號:', document.getElementById('vStyle').value, '工單號:', document.getElementById('vWorkOrder').value],
                ['裁片日期:', document.getElementById('vCutDate').value, '交貨日期:', document.getElementById('vDate').value],
                ['客戶單位:', document.getElementById('vUnit').value, '車縫單位:', document.getElementById('vVendor').value],
                ['品項:', document.getElementById('vItem').value, '顏色:', document.getElementById('vColor').value],
                ['尺寸標說明:', document.getElementById('vSizeDesc').value, '布料:', document.getElementById('vFabric').value],
                ['業務:', document.getElementById('vSales').value, '美編:', document.getElementById('vDesigner').value],
                ['備註:', document.getElementById('vNoteHeader').value, '包裝:', `${packagingVal === '一般' ? '☑' : '☐'}一般 ${packagingVal === '禾田專用' ? '☑' : '☐'}禾田專用`]
            ].forEach(v => {
                const r = ws.addRow([v[0], v[1], '', v[2], v[3]]); ws.mergeCells(`B${r.number}:C${r.number}`); r.height = 22;
                [1, 4].forEach(c => { r.getCell(c).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEEEEEE' } }; r.getCell(c).alignment = { horizontal: 'center', vertical: 'middle' }; r.getCell(c).font = { bold: true, size: 10 }; });
                [2, 5].forEach(c => { r.getCell(c).font = { color: { argb: sHead.argb }, bold: sHead.bold, size: 10 }; r.getCell(c).alignment = { horizontal: 'left', vertical: 'middle', wrapText: true }; });
            });

            // 示意圖：直接用目前畫面上多張圖片的最終排列拍成一張合成快照，方框固定為寬550 x 高330，
            // 保留列的實際列高總和精確等於這個高度，不論排了幾張圖、怎麼排，永遠完整落在方框內，不會超出邊框或跑位
            const IMG_BOX_W = 550, IMG_BOX_H = 330, IMG_ROWS = 15;
            const imgLabelRow = ws.addRow(['示意圖/裁片圖：']); imgLabelRow.font = { bold: true }; ws.mergeCells(`A${imgLabelRow.number}:E${imgLabelRow.number}`);
            const iStart = imgLabelRow.number + 1;
            const imgRowHeightPt = (IMG_BOX_H * XLS_PT_PER_PX) / IMG_ROWS;
            for (let i = 0; i < IMG_ROWS; i++) { const r = ws.addRow(['']); r.height = imgRowHeightPt; }
            const iEnd = ws.rowCount; ws.mergeCells(`A${iStart}:E${iEnd}`);
            const imgSnapshotSrc = await captureImgAreaSnapshot();
            if (imgSnapshotSrc) {
                const mainPng = await toPngDataUrl(imgSnapshotSrc);
                const { w, h } = xlsFitBox(mainPng.width, mainPng.height, IMG_BOX_W, IMG_BOX_H);
                const colOffset = xlsCenterColOffset(w);
                const rowOffsetUnits = Math.max(0, (IMG_BOX_H - h) / 2) / IMG_BOX_H * IMG_ROWS; // 垂直置中：換算成列偏移量
                ws.addImage(wb.addImage({ base64: mainPng.dataUrl, extension: 'png' }), { tl: { col: colOffset, row: iStart - 1 + 0.05 + rowOffsetUnits }, ext: { width: w, height: h }, editAs: 'oneCell' });
            }

            const detText = document.getElementById('vDetail').value;
            const detLabelRow = ws.addRow(['製作說明:']); detLabelRow.getCell(1).font = { bold: true };
            const rDet = ws.addRow([detText]); rDet.height = Math.max(50, (detText.split('\n').length + Math.ceil(detText.length / 60)) * 18);
            ws.mergeCells(`A${rDet.number}:E${rDet.number}`);
            ws.getCell(`A${rDet.number}`).font = { color: { argb: sDet.argb }, bold: sDet.bold }; ws.getCell(`A${rDet.number}`).alignment = { vertical: 'top', horizontal: 'left', wrapText: true };

            let hRow;
            if (tableMode === 'roster') {
                hRow = ws.addRow(['尺寸', '號碼', '姓名', '號碼', '姓名']);
                hRow.height = 28; hRow.font = { bold: true };
                hRow.eachCell(c => { c.alignment = { horizontal: 'center', vertical: 'middle' }; });
                [1, 3].forEach(c => { hRow.getCell(c).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFCCCCCC' } }; });
                [2, 4].forEach(c => { hRow.getCell(c).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8CBAD' } }; });
                hRow.getCell(5).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFCCCCCC' } };
            } else if (tableMode === 'combo') {
                hRow = ws.addRow(['姓名', '背號', '衣尺寸', '褲尺寸', '']);
                hRow.height = 28; hRow.font = { bold: true };
                hRow.eachCell(c => { c.alignment = { horizontal: 'center', vertical: 'middle' }; });
                [1, 3, 4, 5].forEach(c => { hRow.getCell(c).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFCCCCCC' } }; });
                hRow.getCell(2).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8CBAD' } };
            } else {
                hRow = ws.addRow(['尺寸', '數量', '', '備註', '']);
                ws.mergeCells(`D${hRow.number}:E${hRow.number}`); hRow.height = 28; hRow.font = { bold: true };
                hRow.eachCell(c => { c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFCCCCCC' } }; c.alignment = { horizontal: 'center', vertical: 'middle' }; });
            }

            if (tableMode === 'roster') {
                const workNoteVal = document.getElementById('vWorkNote').value;
                if (workNoteVal.trim()) {
                    const wnLabelRow = ws.addRow(['做工說明:']); wnLabelRow.getCell(1).font = { bold: true };
                    const wnRow = ws.addRow([workNoteVal]); wnRow.height = Math.max(40, (workNoteVal.split('\n').length + Math.ceil(workNoteVal.length / 60)) * 18);
                    ws.mergeCells(`A${wnRow.number}:E${wnRow.number}`);
                    ws.getCell(`A${wnRow.number}`).alignment = { vertical: 'top', horizontal: 'left', wrapText: true };
                }
            }

            let total = 0;
            document.querySelectorAll('.size-item').forEach(rItem => {
                if (tableMode === 'combo') {
                    const nameEl = rItem.querySelector('.inp-name'), numEl = rItem.querySelector('.inp-num'), s1El = rItem.querySelector('.inp-size1'), s2El = rItem.querySelector('.inp-size2');
                    if (!nameEl) return;
                    const nameHtml = nameEl.innerHTML, num = numEl.value, size1Html = s1El.innerHTML, size2Html = s2El.innerHTML;
                    const nameText = nameEl.textContent, size1Text = s1El.textContent, size2Text = s2El.textContent;
                    if (nameText.trim() || num || size1Text.trim() || size2Text.trim() || nameHtml.includes('<img')) {
                        const row = ws.addRow(['', parseInt(num)||'', '', '', '']);
                        row.height = Math.max(24, Math.ceil(nameText.length / 20) * 18);
                        row.getCell(1).value = htmlToExcelRichText(nameHtml);
                        row.getCell(3).value = htmlToExcelRichText(size1Html);
                        row.getCell(4).value = htmlToExcelRichText(size2Html);
                        row.getCell(1).alignment = { horizontal: 'left', vertical: 'middle', wrapText: true };
                        row.getCell(2).alignment = { horizontal: 'center', vertical: 'middle' };
                        row.getCell(3).alignment = { horizontal: 'center', vertical: 'middle' };
                        row.getCell(4).alignment = { horizontal: 'center', vertical: 'middle' };
                        total += 1; // 背號只是選填的識別碼，不是數量，合計算訂製人數
                    }
                    return;
                }
                const sHtml = rItem.querySelector('.inp-s').innerHTML, q = rItem.querySelector('.inp-q').value, rHtml = rItem.querySelector('.inp-r').innerHTML;
                const sText = rItem.querySelector('.inp-s').textContent, rText = rItem.querySelector('.inp-r').textContent;
                const q2El = rItem.querySelector('.inp-q2'), r2El = rItem.querySelector('.inp-r2');
                const q2 = q2El ? q2El.value : '';
                const r2Html = r2El ? r2El.innerHTML : '';
                const r2Text = r2El ? r2El.textContent : '';
                const hasEntry1 = sText.trim() || q || rText.trim() || sHtml.includes('<img') || rHtml.includes('<img');
                const hasEntry2 = q2 || r2Text.trim() || r2Html.includes('<img');

                if(hasEntry1 || hasEntry2) {
                    let row;
                    if (tableMode === 'roster') {
                        row = ws.addRow(['', parseInt(q)||'', '', parseInt(q2)||'', '']);
                        row.height = Math.max(24, Math.ceil(Math.max(rText.length, r2Text.length) / 12) * 18);
                        row.getCell(1).value = htmlToExcelRichText(sHtml);
                        row.getCell(3).value = htmlToExcelRichText(rHtml);
                        row.getCell(5).value = htmlToExcelRichText(r2Html);
                        row.getCell(1).alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                        row.getCell(2).alignment = { horizontal: 'center', vertical: 'middle' };
                        row.getCell(3).alignment = { horizontal: 'left', vertical: 'middle', wrapText: true };
                        row.getCell(4).alignment = { horizontal: 'center', vertical: 'middle' };
                        row.getCell(5).alignment = { horizontal: 'left', vertical: 'middle', wrapText: true };
                        // 名單細項模式：號碼是背號，不是數量，合計要算人數/件數而不是加總背號
                        if (hasEntry1) total += 1;
                        if (hasEntry2) total += 1;
                    } else {
                        row = ws.addRow(['', parseInt(q)||'', '', '', '']); ws.mergeCells(`D${row.number}:E${row.number}`);
                        row.height = Math.max(24, Math.ceil(rText.length / 20) * 18);
                        row.getCell(1).value = htmlToExcelRichText(sHtml);
                        row.getCell(4).value = htmlToExcelRichText(rHtml);
                        row.getCell(1).alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                        row.getCell(2).alignment = { horizontal: 'center', vertical: 'middle' };
                        row.getCell(4).alignment = { horizontal: 'left', vertical: 'middle', wrapText: true };
                        if(q && !isNaN(q)) total += parseInt(q);
                    }
                }
            });

            let fRow;
            if (tableMode === 'roster') {
                fRow = ws.addRow(['合計', total, '', '', '']); fRow.height = 30; fRow.font = { bold: true };
                fRow.getCell(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEEEEEE' } };
                fRow.getCell(2).alignment = { horizontal: 'center', vertical: 'middle' };
            } else if (tableMode === 'combo') {
                fRow = ws.addRow(['合計', total, '', '', '']); fRow.height = 30; fRow.font = { bold: true };
                fRow.getCell(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEEEEEE' } };
                fRow.getCell(2).alignment = { horizontal: 'center', vertical: 'middle' };
            } else {
                fRow = ws.addRow(['總計', total, '', document.getElementById('vFooter').value, '']); ws.mergeCells(`D${fRow.number}:E${fRow.number}`); fRow.height = 30; fRow.font = { bold: true };
                fRow.getCell(2).alignment = { horizontal: 'center', vertical: 'middle' }; fRow.getCell(4).font = { color: { argb: sFoot.argb }, bold: sFoot.bold }; fRow.getCell(4).alignment = { horizontal: 'left', vertical: 'middle', wrapText: true };
            }

            ws.eachRow((row, rn) => { if(rn >= (logoData ? 4 : 1)) row.eachCell({ includeEmpty: true }, (cell, cn) => { if (cn <= 5) cell.border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } }; }); });
            ws.pageSetup.printArea = `A1:E${fRow.number}`;
            saveAs(new Blob([await wb.xlsx.writeBuffer()]), `${new Date().toISOString().slice(0,10)}_${document.getElementById('vUnit').value || '未命名'}.xlsx`);
        }
    </script>
</body>
</html>
