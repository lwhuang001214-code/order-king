<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>製單王 Order King</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --primary: #5b5ef4;
            --primary-light: #7b7ff8;
            --primary-dark: #3a3dc4;
            --accent: #ff5da2;
            --success: #14c9a8;
            --success-dark: #0e9a83;
            --warning: #ffab2e;
            --warning-dark: #d47f0a;
            --danger: #f5365c;
            --danger-dark: #c11d40;
            --dark: #171a2e;
            --light: #f8f9fa;
            --bg-color: #eef0fb;

            --panel-width: 420px;
            --a4-width: 210mm; 
            --a4-height: 297mm;

            --shadow-soft: 0 2px 8px rgba(23,26,46,0.06);
            --shadow-mid: 0 10px 28px rgba(23,26,46,0.10);
            --shadow-lift: 0 16px 40px rgba(91,94,244,0.18);
            --radius-lg: 18px;
            --radius-md: 12px;
        }

        * { scrollbar-color: #c7c9f5 transparent; }

        body {
            font-family: 'Inter', 'Noto Sans TC', "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0;
            background: radial-gradient(circle at 15% 0%, #eae7ff 0%, transparent 45%),
                        radial-gradient(circle at 100% 100%, #e3fbf6 0%, transparent 40%),
                        var(--bg-color);
            display: flex; height: 100vh;
            overflow: hidden;
            color: #2a2d45;
        }

        /* --- 左側控制面板 --- */
        .sidebar {
            width: var(--panel-width);
            min-width: var(--panel-width);
            background: #fff;
            box-shadow: 6px 0 30px rgba(23,26,46,0.08);
            display: flex; flex-direction: column;
            z-index: 20;
            border-right: 1px solid rgba(23,26,46,0.05);
            position: relative;
        }

        .sidebar-header {
            padding: 24px 26px;
            background: linear-gradient(125deg, #2d2e6f 0%, var(--primary) 55%, #8b3dff 100%);
            color: #fff;
            box-shadow: 0 8px 24px rgba(58, 61, 196, 0.35);
            display: flex; align-items: center; gap: 15px;
            position: relative; overflow: hidden;
        }
        .sidebar-header::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 85% -20%, rgba(255,255,255,0.35), transparent 55%),
                        radial-gradient(circle at -10% 120%, rgba(255,93,162,0.35), transparent 50%);
            pointer-events: none;
        }
        .app-icon-display {
            width: 44px; height: 44px; background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.18), 0 0 0 3px rgba(255,255,255,0.25);
            position: relative; z-index: 1; flex-shrink: 0;
        }
        .app-icon-display svg { width: 30px; height: 30px; }
        .sidebar-header h2 { margin: 0; font-size: 1.45rem; font-weight: 800; letter-spacing: 1.5px; color: white; position: relative; z-index: 1; }
        .sidebar-header .subtitle { margin: 2px 0 0; font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.75); font-weight: 500; position: relative; z-index: 1; text-transform: uppercase; }

        .sidebar-content {
            flex: 1; overflow-y: auto; padding: 22px 20px;
            display: flex; flex-direction: column; gap: 16px;
            scrollbar-width: thin;
        }
        .sidebar-content::-webkit-scrollbar { width: 6px; }
        .sidebar-content::-webkit-scrollbar-thumb { background: #d7d8f7; border-radius: 10px; }
        .sidebar-content::-webkit-scrollbar-thumb:hover { background: #b9bbf2; }

        .card {
            background: #fff; border-radius: var(--radius-lg); padding: 18px;
            box-shadow: var(--shadow-soft); border: 1px solid #eef0fb;
            transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-mid); border-color: #e3e4fb; }
        .card-title {
            font-size: 0.95rem; font-weight: 700; color: #363a5c;
            margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 10px; border-bottom: 1px solid #f0f1fa;
        }
        .card-title > span:first-child { display: flex; align-items: center; gap: 9px; }

        .icon-badge {
            width: 26px; height: 26px; border-radius: 8px; flex-shrink: 0;
            display: inline-flex; align-items: center; justify-content: center;
            color: #fff; font-size: 12px; box-shadow: 0 3px 8px rgba(0,0,0,0.18);
        }
        .icon-badge-red { background: linear-gradient(135deg, #ff7a8a, var(--danger)); }
        .icon-badge-indigo { background: linear-gradient(135deg, #7b7ff8, var(--primary)); }
        .icon-badge-blue { background: linear-gradient(135deg, #56ccf2, #2f80ed); }
        .icon-badge-teal { background: linear-gradient(135deg, #43e6c4, var(--success)); }
        .icon-badge-orange { background: linear-gradient(135deg, #ffc26b, var(--warning)); }
        .icon-badge-purple { background: linear-gradient(135deg, #b28dff, #7209b7); }
        .icon-badge-pink { background: linear-gradient(135deg, #ff8fc0, var(--accent)); }

        .btn-3d {
            position: relative; display: inline-flex; justify-content: center; align-items: center;
            font-weight: 700; text-decoration: none; color: white;
            border: none; border-radius: 8px; padding: 10px 15px; cursor: pointer;
            transition: all 0.1s; font-size: 14px; gap: 8px; transform: translateY(0);
        }
        .btn-3d::after {
            content: ''; position: absolute; inset: 0; border-radius: inherit;
            background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0) 55%);
            pointer-events: none;
        }
        .btn-3d:hover { filter: brightness(1.05); }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 0px 0 0 transparent !important; filter: brightness(0.97); }
        .btn-blue { background: linear-gradient(135deg, var(--primary-light), var(--primary)); box-shadow: 0 4px 0 var(--primary-dark), 0 6px 14px rgba(91,94,244,0.28); }
        .btn-green { background: linear-gradient(135deg, #35e0bd, var(--success)); box-shadow: 0 4px 0 var(--success-dark), 0 6px 14px rgba(20,201,168,0.28); }
        .btn-orange { background: linear-gradient(135deg, #ffc266, var(--warning)); box-shadow: 0 4px 0 var(--warning-dark), 0 6px 14px rgba(255,171,46,0.28); }
        .btn-red { background: linear-gradient(135deg, #ff7a8a, var(--danger)); box-shadow: 0 4px 0 var(--danger-dark), 0 6px 14px rgba(245,54,92,0.28); }
        .btn-purple { background: linear-gradient(135deg, #b28dff, #7209b7); box-shadow: 0 4px 0 #480ca8, 0 6px 14px rgba(114,9,183,0.28); }
        .btn-teal { background: linear-gradient(135deg, #7be2ff, #4cc9f0); box-shadow: 0 4px 0 #4895ef, 0 6px 14px rgba(76,201,240,0.3); color: #0b2b3a; }
        .btn-gray { background: linear-gradient(135deg, #aab4c4, #94a3b8); box-shadow: 0 4px 0 #64748b; }
        .btn-white { background: #fff; color: #475569; border: 1px solid #dfe2f5; box-shadow: 0 3px 0 #c7cbe8; }
        .btn-white:hover { border-color: var(--primary-light); color: var(--primary); }

        input, textarea {
            width: 100%; padding: 10px 12px;
            border: 2px solid #e7e8f8; border-radius: 10px;
            font-size: 14px; box-sizing: border-box; background: #f8f9fe;
            font-family: inherit; transition: all 0.25s;
        }
        input:focus, textarea:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(91, 94, 244, 0.14); outline: none; }
        textarea { resize: vertical; min-height: 80px; }
        .row-2 { display: flex; gap: 10px; margin-bottom: 10px; } .row-2 > * { flex: 1; }

        .tools { display: flex; gap: 8px; align-items: center; }
        .color-circle {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid #e7e8f8; overflow: hidden; cursor: pointer;
            position: relative; box-shadow: 0 2px 6px rgba(23,26,46,0.12);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .color-circle:hover { transform: scale(1.08); box-shadow: 0 4px 10px rgba(91,94,244,0.3); }
        input[type="color"] { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; padding: 0; border: none; cursor: pointer; }
        
        .chk-3d {
            cursor: pointer; padding: 5px 11px; border-radius: 8px;
            background: #f1f2fb; color: #6b6f8f; font-weight: bold; font-size: 12px;
            border: 1px solid #dfe2f5; box-shadow: 0 2px 0 #c7cbe8;
            transition: all 0.15s; display: flex; align-items: center; gap: 5px;
        }
        .chk-3d:active { transform: translateY(2px); box-shadow: none; }
        .chk-3d.active { background: linear-gradient(135deg, var(--primary-light), var(--primary)); color: white; border-color: var(--primary-dark); box-shadow: 0 2px 0 var(--primary-dark); }
        .chk-3d input { display: none; }

        /* --- 尺寸列與富文本編輯器 --- */
        .size-item {
            display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px;
            background: linear-gradient(180deg, #fbfbff, #f5f6fd); padding: 13px; border-radius: 12px; border: 1px solid #e7e8f8;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .size-item:hover { box-shadow: var(--shadow-soft); border-color: #d9dbf6; }
        .size-row-top { display: flex; align-items: center; gap: 8px; width: 100%; }
        .size-item.sortable-ghost { opacity: 0.4; background: #e2e8f0; }
        .handle { cursor: grab; color: #a3a7cc; padding: 5px; font-size: 14px; }
        
        .rich-input {
            padding: 8px; border: 2px solid #e7e8f8; border-radius: 10px;
            background: #fff; font-size: 14px; outline: none; transition: all 0.25s;
            overflow-wrap: anywhere; box-sizing: border-box; cursor: text;
        }
        .rich-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(91, 94, 244, 0.14); }
        .rich-input:empty:before { content: attr(data-placeholder); color: #a0aec0; pointer-events: none; }
        
        /* 修改：移除了 font-weight: 700，讓尺寸格子預設不加粗，以利看出效果 */
        .inp-s { flex: 1; text-align: center; color: var(--primary); white-space: nowrap; overflow: hidden; }
        .inp-q { flex: 1; text-align: center; font-weight: 700; color: var(--primary); }
        
        /* 修改：加入 resize: vertical 與 overflow-y: auto 讓備註框可以自由往下拉長放大 */
        .inp-r { width: 100%; min-height: 50px; margin-top: 5px; resize: vertical; overflow-y: auto; }

        /* --- 名單細項模式：同一列可再加第二組「號碼/姓名」，充分利用版面 --- */
        .size-row-pair2 { display: flex; gap: 8px; margin-top: 6px; padding-top: 8px; border-top: 1px dashed #dfe2f5; align-items: flex-start; }
        .inp-q2 {
            width: 64px; flex-shrink: 0; text-align: center; font-weight: 700; color: var(--primary);
            padding: 8px; border: 2px solid #e7e8f8; border-radius: 10px; background: #fff; font-size: 14px; outline: none;
        }
        .inp-q2:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(91, 94, 244, 0.14); }
        .inp-r2 { flex: 1; min-height: 40px; }
        .pair2-tag { font-size: 11px; color: #9598c2; flex-shrink: 0; align-self: center; }

        /* --- 訂製衣褲模式：姓名 + 背號(選填) + 衣尺寸 + 褲尺寸，由左至右排在同一列 --- */
        .inp-name { flex: 1.6; text-align: left; }
        .inp-num {
            width: 78px; flex-shrink: 0; text-align: center; font-weight: 700; color: var(--primary);
            padding: 8px; border: 2px solid #e7e8f8; border-radius: 10px; background: #fff; font-size: 14px; outline: none;
        }
        .inp-num:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(91, 94, 244, 0.14); }
        .inp-size1, .inp-size2 { flex: 1; text-align: center; color: var(--primary); }
        
        .btn-mini {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; border: none; flex-shrink: 0;
            background: #fff; border: 1px solid #dfe2f5; color: #6b6f8f; box-shadow: 0 2px 0 #c7cbe8;
            transition: all 0.15s;
        }
        .btn-mini:active { transform: translateY(2px); box-shadow: none !important; }
        .btn-mini-bold:hover { background: #eef0ff; color: var(--primary); border-color: var(--primary-light); }
        .btn-mini-del { background: #fff0f2; border-color: #ffd0da; color: var(--danger); box-shadow: 0 2px 0 #ffb0be; }
        .btn-mini-del:hover { background: var(--danger); color: #fff; }

        .action-bar { padding: 20px; background: #fff; border-top: 1px solid #eef0fb; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 -8px 24px rgba(23,26,46,0.05); position: relative; z-index: 5; }
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .preview-container {
            flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 30px; position: relative;
            background:
                radial-gradient(circle at 1px 1px, rgba(23,26,46,0.10) 1px, transparent 0) 0 0/22px 22px,
                linear-gradient(160deg, #4d5079 0%, #2e3057 55%, #1c1e38 100%);
        }

        .page-badge {
            position: fixed; top: 20px; right: 30px; z-index: 15;
            background: rgba(23,26,46,0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: #fff; font-weight: 600; font-size: 13px;
            padding: 9px 18px; border-radius: 30px; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex; align-items: center; gap: 7px; pointer-events: none;
        }
        .page-badge i { color: #9ba3ff; }

        /* --- 手機版容器：讓A4預覽可依螢幕寬度自動等比縮小，不影響匯出實際尺寸 --- */
        .sheet-wrap { position: relative; margin: 0 auto 20px; }

        /* --- 手機漢堡選單與遮罩(預設隱藏，僅窄螢幕顯示) --- */
        .mobile-toggle-btn {
            display: none; position: fixed; top: 14px; left: 14px; z-index: 150;
            width: 46px; height: 46px; border-radius: 13px; border: none; cursor: pointer;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            color: #fff; align-items: center; justify-content: center; font-size: 19px;
            box-shadow: 0 8px 20px rgba(91,94,244,0.45);
        }
        .mobile-toggle-btn:active { transform: scale(0.94); }
        .sidebar-backdrop { display: none; }
        .sidebar-backdrop.show {
            display: block; position: fixed; inset: 0; z-index: 140;
            background: rgba(15,17,30,0.5); backdrop-filter: blur(2px);
        }

        @media screen and (max-width: 900px) {
            .mobile-toggle-btn { display: flex; }
            body.sidebar-open .mobile-toggle-btn { display: none; }
            body { overflow: hidden; }
            .sidebar {
                position: fixed; top: 0; left: 0; height: 100%;
                width: min(86vw, 380px); min-width: 0;
                transform: translateX(-100%);
                transition: transform 0.32s cubic-bezier(.2,.9,.3,1);
                z-index: 145;
            }
            .sidebar.open { transform: translateX(0); box-shadow: 25px 0 60px rgba(0,0,0,0.35); }
            .preview-container { width: 100%; padding: 64px 12px 30px; }
            .page-badge { top: 14px; right: 14px; padding: 7px 14px; font-size: 12px; }
            .sheet-wrap {
                width: calc(var(--mobile-scale, 1) * 210mm);
                height: calc(var(--mobile-scale, 1) * 297mm);
                overflow: hidden; margin-bottom: 16px;
            }
            .sheet-wrap .sheet { transform: scale(var(--mobile-scale, 1)); transform-origin: top left; margin-bottom: 0; }
            .action-bar { padding: 14px; }
        }
        
        .sheet {
            /* 關鍵修正：flex-shrink:0 讓A4紙張在任何內容量下都維持真實尺寸，
               不會被外層 .preview-container 的 flex 版面壓扁變形（這是匯出PDF/JPG跑版的根本原因） */
            flex-shrink: 0;
            background: white; width: var(--a4-width); height: var(--a4-height);
            min-height: var(--a4-height); max-height: var(--a4-height);
            padding: 10mm 15mm 20mm 15mm; box-sizing: border-box;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35), 0 4px 12px rgba(0,0,0,0.15); position: relative; margin-bottom: 20px;
            overflow: hidden; border-radius: 3px;
        }
        .page-num { position: absolute; bottom: 8mm; right: 10mm; font-size: 10pt; color: #999; }

        .logo-area { text-align: center; margin-bottom: 5px; } 
        .logo-area img { max-height: 70px; max-width: 100%; object-fit: contain; }
        .sheet-header { text-align: center; margin-bottom: 5px; }
        .sheet-title { font-size: 24pt; font-weight: 800; letter-spacing: 4px; margin: 0; color: #000; }
        
        .info-grid { display: grid; grid-template-columns: 80px 1fr 80px 1fr; border: 2px solid #000; margin-bottom: 8px; }
        .grid-cell { padding: 6px 8px; border: 1px solid #000; font-size: 11pt; display: flex; align-items: center; }
        .cell-label { background: #eee; font-weight: bold; justify-content: center; }

        /* --- 新版表頭欄位：三列等高、四組欄寬一致，貼近公司現用製單的平均分格 --- */
        .info-grid-v2 {
            display: grid;
            grid-template-columns: 60px 1fr 60px 1fr 60px 1fr 60px 1.2fr;
            grid-auto-rows: 42px;
            border: 2px solid #000;
            margin-bottom: 6px;
            font-size: 9pt;
        }
        .info-grid-v2 .grid-cell { padding: 4px 5px; border: 1px solid #000; display: flex; align-items: center; overflow: visible; box-sizing: border-box; }
        .info-grid-v2 .cell-label { background: #eee; font-weight: bold; justify-content: center; text-align: center; line-height: 1.2; white-space: nowrap; }
        .info-grid-v2 .cell-stack { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 1px; line-height: 1.2; width: 100%; white-space: nowrap; }
        .info-grid-v2 .grid-cell:not(.cell-label) .cell-stack { align-items: flex-start; }
        .pack-check { font-weight: bold; white-space: nowrap; }

        .img-area { width: 100%; height: 320px; border: 2px solid #000; margin-bottom: 8px; overflow: hidden; background: #fff; position: relative; touch-action: none; }
        .img-placeholder { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; color: #ccc; font-size: 24px; font-weight: bold; letter-spacing: 2px; pointer-events: none; }
        .img-area-small { width: 100%; height: 120px; border: 2px solid #000; margin-bottom: 8px; overflow: hidden; background: #fff; position: relative; }
        /* 每張示意圖的拖曳/縮放容器 */
        .img-item { position: absolute; box-sizing: border-box; cursor: move; }
        .img-item img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }
        .img-item.selected { outline: 2px dashed var(--primary); outline-offset: 2px; }
        .img-delete-btn {
            position: absolute; top: -11px; right: -11px; width: 22px; height: 22px; border-radius: 50%;
            background: var(--danger); color: #fff; display: none; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 5;
        }
        .img-item.selected .img-delete-btn { display: flex; }
        .img-resize-handle {
            position: absolute; right: -7px; bottom: -7px; width: 16px; height: 16px; border-radius: 50%;
            background: var(--primary); border: 2px solid #fff; cursor: nwse-resize; display: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); z-index: 5;
        }
        .img-item.selected .img-resize-handle { display: block; }
        /* 匯出成 PDF/JPEG/Excel 快照時，隱藏拖曳/縮放/刪除等互動用UI，只留下純圖片內容 */
        .exporting .img-delete-btn, .exporting .img-resize-handle { display: none !important; }
        .exporting .img-item.selected { outline: none !important; }

        /* --- 示意圖上傳縮圖清單(側邊欄) --- */
        .img-thumb-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .img-thumb { position: relative; width: 56px; height: 56px; border-radius: 8px; overflow: hidden; border: 2px solid #e7e8f8; background: #f8f9fe; }
        .img-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .img-thumb .img-thumb-del {
            position: absolute; top: 0; right: 0; width: 18px; height: 18px; background: rgba(245,54,92,0.92); color: #fff;
            display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; border-bottom-left-radius: 6px;
        }
        
        .detail-area { display: grid; grid-template-columns: 1fr 180px; border: 2px solid #000; min-height: 80px; margin-bottom: 8px; }
        .detail-text { padding: 8px; border-right: 1px solid #000; font-size: 11pt; white-space: pre-wrap; word-break: break-all; }
        .date-area { padding: 8px; display: flex; flex-direction: column; align-items: center; }
        
        table.order-table { width: 100%; border-collapse: collapse; margin-top: 5px; table-layout: fixed; }
        table.order-table th, table.order-table td { border: 1px solid #000; padding: 6px; text-align: center; font-size: 11pt; vertical-align: middle; word-break: break-all; }
        table.order-table th { background: #eee; border-bottom: 2px solid #000; font-weight: bold; }
        table.order-table th.th-orange { background: #f8cbad; }
        table.order-table td:last-child { text-align: left; padding-left: 8px; white-space: pre-wrap; }

        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(23,26,46,0.55); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); color: white; display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; gap: 18px; }
        #loadingOverlay .loading-card {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
            border-radius: 20px; padding: 34px 44px; display: flex; flex-direction: column; align-items: center; gap: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }
        #loadingOverlay i { font-size: 2rem; background: linear-gradient(135deg, var(--primary-light), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        #loadingOverlay span { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.5px; }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; display: block; overflow: visible; height: auto; }
            .sidebar { display: none !important; }
            .mobile-toggle-btn { display: none !important; }
            .sidebar-backdrop { display: none !important; }
            .page-badge { display: none !important; }
            #loadingOverlay { display: none !important; }
            .preview-container { padding: 0; margin: 0; background: white; display: block; overflow: visible; height: auto; }
            .sheet { flex-shrink: 0; margin: 0; box-shadow: none; width: 100%; height: 297mm; max-height: 297mm; page-break-after: always; break-after: page; border: none; overflow: hidden; clip-path: inset(0); contain: paint; transform: none !important; }
            /* 最後一頁不需要再強制分頁，避免最後面多印出一張空白頁 */
            .sheet-wrap:last-child .sheet { page-break-after: auto; break-after: auto; }
            .sheet-wrap { page-break-inside: avoid; break-inside: avoid; }
            .sheet-wrap { width: auto !important; height: auto !important; overflow: visible !important; margin: 0 !important; }
            .img-delete-btn, .img-resize-handle { display: none !important; }
            .img-item { outline: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

    <div id="loadingOverlay"><div class="loading-card"><i class="fas fa-spinner fa-spin"></i><span>處理中，請稍候...</span></div></div>

    <button class="mobile-toggle-btn" id="mobileToggleBtn" onclick="toggleSidebar()" title="開啟選單"><i class="fas fa-bars"></i></button>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebarPanel">
        <div class="sidebar-header">
            <div class="app-icon-display">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 43.51 43.51" style="width:32px;height:32px;">
                    <defs>
                        <style>

                        </style>
                        <linearGradient id="logo-gradient-28" x1="21.76" y1="41.51" x2="21.76" y2="2" gradientUnits="userSpaceOnUse">

                    <g>

                        <path class="logo-st0" d="M18.94,35.44h-3.71v1.16h-1.47v-1.16h-3.59v-1.21h3.59v-.37h-2.71v-3.82h7.06v3.82h-2.88v.37h3.71v1.21ZM14.32,29.73h-3.66v-2h3.66v2ZM13,28.55h-1.09v.36h1.09v-.36ZM12.44,31.46h1.32v-.34h-1.32v.34ZM13.77,32.79v-.34h-1.32v.34h1.32ZM18.48,29.73h-3.69v-2h3.69v2ZM16.66,31.12h-1.42v.34h1.42v-.34ZM16.66,32.45h-1.42v.34h1.42v-.34ZM17.15,28.55h-1.12v.36h1.12v-.36Z"/>
                        <path class="logo-st0" d="M33.34,34.59v1.39h-8.95v-1.39h3.7v-2.19h-2.76v-1.39h2.76v-1.91h-3.23v-1.39h7.98v1.39h-3.25v1.91h2.85v1.39h-2.85v2.19h3.75Z"/>

                </svg>
            </div>
            <div>
                <h2>製單王</h2>
                <p class="subtitle">ORDER KING · 成衣製單系統</p>
            </div>
        </div>

        <div class="sidebar-content">
            <div class="card" style="border-left: 4px solid var(--danger); background: linear-gradient(180deg, #fff6f7, #fff);">
                <div class="card-title" style="color:var(--danger)"><span><span class="icon-badge icon-badge-red"><i class="fas fa-bolt"></i></span> 快速操作</span></div>
                <button class="btn-3d btn-red" style="width:100%" onclick="if(confirm('確定要清空所有內容重新開始嗎？')) resetForm()"><i class="fas fa-trash-alt"></i> 清除重作</button>
            </div>

            <div class="card">
                <div class="card-title"><span><span class="icon-badge icon-badge-indigo"><i class="fas fa-building"></i></span> 公司 Logo</span></div>
                <div style="display:flex; gap:10px;">
                    <label class="btn-3d btn-white" style="flex:1"><i class="fas fa-upload"></i> 上傳 Logo<input type="file" id="logoInput" accept="image/*" onchange="loadLogo(this)" style="display:none"></label>
                    <button class="btn-3d btn-gray" onclick="clearLogo()" title="清除 Logo"><i class="fas fa-times"></i></button>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><span><span class="icon-badge icon-badge-blue"><i class="fas fa-heading"></i></span> 單據標題</span>
                    <div class="tools"><div class="color-circle"><input type="color" id="cTitle" value="#000000" oninput="render()"></div><label class="chk-3d" id="lbl-bTitle"><i class="fas fa-bold"></i><input type="checkbox" id="bTitle" checked onchange="toggleChk('bTitle'); render()"></label></div>
                </div>
                <div class="row-2">
                    <input type="text" id="vTitle" value="製單" placeholder="輸入標題" oninput="render()" style="flex:2">
                    <input type="text" id="vYear" value="" placeholder="年份" oninput="render()" style="flex:1; text-align:center;">
                </div>
                <p style="font-size:11px; color:#94a3b8; margin:6px 0 0;">💡 標題會自動接上年份，例如「製單」+「2026」＝「製單2026」，年份可自由修改或留空。</p>
            </div>

            <div class="card">
                <div class="card-title"><span><span class="icon-badge icon-badge-teal"><i class="fas fa-id-card"></i></span> 基本資料</span>
                    <div class="tools"><div class="color-circle"><input type="color" id="cHeader" value="#000000" oninput="render()"></div><label class="chk-3d" id="lbl-bHeader"><i class="fas fa-bold"></i><input type="checkbox" id="bHeader" onchange="toggleChk('bHeader'); render()"></label></div>
                </div>
                <div class="row-2"><input id="vStyle" placeholder="版號" oninput="render()"><input id="vWorkOrder" placeholder="工單號" oninput="render()"></div>
                <div class="row-2"><input id="vCutDate" type="date" placeholder="裁片日期" oninput="render()"><input id="vDate" type="date" placeholder="交貨日期" oninput="render()"></div>
                <div class="row-2"><input id="vUnit" placeholder="客戶單位" oninput="render()"><input id="vVendor" placeholder="車縫單位" oninput="render()"></div>
                <div class="row-2"><input id="vItem" placeholder="品項" oninput="render()"><input id="vColor" placeholder="顏色" oninput="render()"></div>
                <input id="vNoteHeader" placeholder="備註" oninput="render()" style="margin-top:10px;">
            </div>

            <div class="card">
                <div class="card-title"><span><span class="icon-badge icon-badge-purple"><i class="fas fa-industry"></i></span> 生產資訊</span></div>
                <div class="row-2"><input id="vSizeDesc" placeholder="尺寸標說明" oninput="render()"><input id="vFabric" placeholder="布料" oninput="render()"></div>
                <div class="row-2"><input id="vSales" placeholder="業務" oninput="render()"><input id="vDesigner" placeholder="美編" oninput="render()"></div>
                <div style="margin-top:10px;">
                    <label style="font-size:12px; font-weight:bold; color:#6b6f8f; display:block; margin-bottom:6px;">包裝方式</label>
                    <div class="tools">
                        <label class="chk-3d active" id="lbl-pack1"><input type="radio" name="vPackaging" value="一般" checked onchange="selectPackaging(this.value)"> 一般</label>
                        <label class="chk-3d" id="lbl-pack2"><input type="radio" name="vPackaging" value="禾田專用" onchange="selectPackaging(this.value)"> 禾田專用</label>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><span><span class="icon-badge icon-badge-orange"><i class="fas fa-image"></i></span> 示意圖與細節</span>
                    <div class="tools"><div class="color-circle"><input type="color" id="cDetail" value="#000000" oninput="render()"></div><label class="chk-3d" id="lbl-bDetail"><i class="fas fa-bold"></i><input type="checkbox" id="bDetail" onchange="toggleChk('bDetail'); render()"></label></div>
                </div>
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <label class="btn-3d btn-white" style="flex:1"><i class="fas fa-image"></i> 新增圖片<input type="file" id="imgInput" accept="image/*" multiple onchange="loadImg(this)" style="display:none"></label>
                    <button class="btn-3d btn-gray" onclick="if(confirm('確定要清除全部示意圖片嗎？'))clearAllImg()" title="清除全部圖片"><i class="fas fa-times"></i></button>
                </div>
                <p style="font-size:11px; color:#94a3b8; margin:0 0 6px;">💡 可一次新增多張圖片，直接在右側示意圖框內用滑鼠拖曳移動、拖角落把手縮放；點縮圖右上角 × 可個別刪除。</p>
                <div class="img-thumb-list" id="imgThumbList"></div>
                <textarea id="vDetail" placeholder="輸入製作注意事項..." oninput="render()" style="margin-top:10px;"></textarea>
            </div>

            <div class="card">
                <div class="card-title" style="margin-bottom: 5px;"><span><span class="icon-badge icon-badge-purple"><i class="fas fa-ruler-combined"></i></span> 尺寸與數量 (支援反白選字改色)</span></div>
                <div class="tools" style="margin-bottom:10px; flex-wrap:wrap;">
                    <label class="chk-3d active" id="lbl-mode-qty" style="flex:1 1 30%; justify-content:center;"><input type="radio" name="tableMode" value="qty" checked onchange="setTableMode('qty')"> 尺寸/數量</label>
                    <label class="chk-3d" id="lbl-mode-roster" style="flex:1 1 30%; justify-content:center;"><input type="radio" name="tableMode" value="roster" onchange="setTableMode('roster')"> 名單細項(號碼/姓名)</label>
                    <label class="chk-3d" id="lbl-mode-combo" style="flex:1 1 30%; justify-content:center;"><input type="radio" name="tableMode" value="combo" onchange="setTableMode('combo')"> 訂製衣褲(姓名/背號/衣褲尺寸)</label>
                </div>
                <p style="font-size: 12px; color: #64748b; margin: 0 0 10px 0;">💡 提示：在輸入框反白文字，或直接點在框內，按 B 即可單獨改色或加粗。</p>
                <div id="sizeList"></div>
                <button class="btn-3d btn-white" style="width:100%; border:2px dashed #cbd5e1; color:#64748b; box-shadow:none;" onclick="addSize()"><i class="fas fa-plus-circle"></i> 新增一列</button>
                <div id="workNoteWrap" style="display:none; margin-top:12px;">
                    <label style="font-size:12px; font-weight:bold; color:#6b6f8f; display:block; margin-bottom:6px;">做工說明 (名單細項表共用，會印在表格右側)</label>
                    <textarea id="vWorkNote" placeholder="輸入做工說明..." oninput="render()"></textarea>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><span><span class="icon-badge icon-badge-pink"><i class="fas fa-thumbtack"></i></span> 底部備註</span>
                    <div class="tools"><div class="color-circle"><input type="color" id="cFooter" value="#ff0000" oninput="render()"></div><label class="chk-3d active" id="lbl-bFooter"><i class="fas fa-bold"></i><input type="checkbox" id="bFooter" checked onchange="toggleChk('bFooter'); render()"></label></div>
                </div>
                <input id="vFooter" placeholder="例如: 總計無誤..." oninput="render()">
            </div>
            <div style="height:20px;"></div>
        </div>

        <div class="action-bar">
            <div style="font-size:11px; font-weight:700; color:#9599c2; letter-spacing:1.5px; margin-bottom:2px;">
                <i class="fas fa-file-export"></i> 匯出與存檔
            </div>
            <div class="action-row"><button class="btn-3d btn-green" onclick="saveProject()"><i class="fas fa-save"></i> 存 JSON</button><button class="btn-3d btn-orange" onclick="document.getElementById('loadInput').click()"><i class="fas fa-folder-open"></i> 讀 JSON</button><input type="file" id="loadInput" accept=".json" style="display:none" onchange="loadProject(this)"></div>
            <div class="action-row"><button class="btn-3d btn-blue" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Excel</button><button class="btn-3d btn-purple" onclick="exportToPdf()"><i class="fas fa-file-pdf"></i> PDF</button></div>
            <div class="action-row"><button class="btn-3d btn-teal" onclick="exportToJpeg()"><i class="fas fa-image"></i> JPG</button><button class="btn-3d btn-gray" style="background:linear-gradient(135deg,#3d4160,#171a2e); box-shadow:0 4px 0 #0b0d1a;" onclick="window.print()"><i class="fas fa-print"></i> 列印</button></div>
        </div>
    </div>

    <div class="page-badge" id="pageBadge"><i class="fas fa-file-alt"></i> <span id="pageBadgeText">共 1 頁</span></div>
    <div class="preview-container" id="previewArea"></div>

    <script>
        const ROWS_PAGE1 = 6; 
        const ROWS_PAGE_N = 20; 
        const IMG_BOX_TRUE_W = 680, IMG_BOX_TRUE_H = 320; // 示意圖框內部「真實」像素尺寸(對應CSS：210mm-左右padding各15mm，高度固定320px)
        let logoData = null;
        let imgList = []; // 示意圖：多張圖片，每張 {id, src, x, y, scale, naturalW, naturalH}
        let selectedImgId = null;
        let nextImgId = 1;
        let currentMobileScale = 1; // 追蹤目前手機版縮放比例，拖曳/縮放示意圖時需要用它把螢幕像素換算回真實像素
        let tableMode = 'qty'; // 'qty'=尺寸/數量/備註表 ; 'roster'=名單細項(尺寸/號碼/姓名)表，兩種共用同一份列資料(s,q,r)，只是欄位意義與標籤不同

        // --- 離開前存檔提醒：只要內容有變動且尚未存 JSON，關閉分頁/視窗前會跳出瀏覽器警告視窗 ---
        let hasUnsavedChanges = false;
        window.addEventListener('beforeunload', function (e) {
            if (hasUnsavedChanges) {
                e.preventDefault();
                e.returnValue = '您尚未儲存 JSON 檔案，確定要離開嗎？'; // 注意：基於瀏覽器安全機制，實際顯示文字由瀏覽器決定，無法自訂
                return e.returnValue;
            }
        });

        // --- 手機版：側邊欄抽屜開關 ---
        function toggleSidebar() {
            document.getElementById('sidebarPanel').classList.toggle('open');
            document.getElementById('sidebarBackdrop').classList.toggle('show');
            document.body.classList.toggle('sidebar-open');
        }
        function closeSidebar() {
            document.getElementById('sidebarPanel').classList.remove('open');
            document.getElementById('sidebarBackdrop').classList.remove('show');
            document.body.classList.remove('sidebar-open');
        }

        function selectPackaging(value) {
            document.getElementById('lbl-pack1').classList.toggle('active', value === '一般');
            document.getElementById('lbl-pack2').classList.toggle('active', value === '禾田專用');
            render();
        }

        // 切換表格模式：「尺寸/數量」跟「名單細項」共用同一份列資料(s,q,r/q2,r2)，只是欄位意義跟顯示標籤不同；
        // 但「訂製衣褲」欄位結構完全不同(姓名/背號/衣尺寸/褲尺寸)，跨這個界線切換時既有列資料對不上，需清空重建並先跟使用者確認
        function setTableMode(mode) {
            const prevMode = tableMode;
            const crossingComboBoundary = (prevMode === 'combo') !== (mode === 'combo');
            if (crossingComboBoundary) {
                const contentSelectors = '.inp-s, .inp-q, .inp-r, .inp-q2, .inp-r2, .inp-name, .inp-num, .inp-size1, .inp-size2';
                const hasContent = Array.from(document.querySelectorAll('.size-item')).some(row =>
                    Array.from(row.querySelectorAll(contentSelectors)).some(el => (el.value !== undefined ? el.value : el.textContent).trim() !== '')
                );
                if (hasContent && !confirm('「訂製衣褲」的欄位結構(姓名/背號/衣尺寸/褲尺寸)跟目前的表格不同，切換後目前已輸入的列會被清空重新開始，確定要切換嗎？')) {
                    document.querySelector(`input[name="tableMode"][value="${prevMode}"]`).checked = true;
                    return;
                }
                tableMode = mode;
                document.getElementById('sizeList').innerHTML = '';
                addSize();
            } else {
                tableMode = mode;
            }
            document.getElementById('lbl-mode-qty').classList.toggle('active', mode === 'qty');
            document.getElementById('lbl-mode-roster').classList.toggle('active', mode === 'roster');
            document.getElementById('lbl-mode-combo').classList.toggle('active', mode === 'combo');
            document.getElementById('workNoteWrap').style.display = mode === 'roster' ? 'block' : 'none';
            updateSizeRowPlaceholders();
            render();
        }
        function updateSizeRowPlaceholders() {
            if (tableMode === 'combo') return; // combo模式欄位固定且切換時已重建過，不需要再改placeholder
            const isRoster = tableMode === 'roster';
            document.querySelectorAll('.size-item').forEach(row => {
                if (!row.querySelector('.inp-s')) return; // 保險：避免混到combo結構的列
                row.querySelector('.inp-s').dataset.placeholder = '尺碼';
                row.querySelector('.inp-q').placeholder = isRoster ? '號碼①' : '數量';
                row.querySelector('.inp-r').dataset.placeholder = isRoster ? '姓名① (反白文字或點入框內，按右上角改色/加粗)...' : '備註內容 (反白文字或點入框內，按右上角改色/加粗)...';
                const pair2 = row.querySelector('.size-row-pair2');
                if (pair2) pair2.style.display = isRoster ? 'flex' : 'none';
            });
        }

        // --- 手機版：依可視寬度計算A4預覽的縮放比例(僅視覺縮放，不影響匯出的實際像素尺寸) ---
        function updateMobileScale() {
            if (window.innerWidth > 900) { currentMobileScale = 1; document.documentElement.style.setProperty('--mobile-scale', 1); return; }
            const container = document.getElementById('previewArea');
            if (!container) return;
            const availableWidth = container.clientWidth - 24;
            const scale = Math.max(0.25, Math.min(1, availableWidth / 794));
            currentMobileScale = scale;
            document.documentElement.style.setProperty('--mobile-scale', scale);
        }
        window.addEventListener('resize', updateMobileScale);

        // --- 全域反白範圍捕捉 (Rich Text Editor 核心) ---
        let lastSelectionRange = null;
        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                let container = range.commonAncestorContainer;
                if (container.nodeType === 3) container = container.parentNode;
                // 確保使用者反白的地方是我們的「富文本輸入框」裡面
                if (container.closest('.rich-input')) {
                    lastSelectionRange = range;
                }
            }
        });

        // 升級版：支援「智慧全選」的格式套用
        function applyFormatToSelection(command, value = null) {
            if (!lastSelectionRange) return;
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(lastSelectionRange);
            
            // 智慧選取：如果沒有反白任何文字（只剩游標閃爍），就自動選取該輸入框「全部內容」來套用格式
            if (sel.isCollapsed) {
                let container = lastSelectionRange.commonAncestorContainer;
                if (container.nodeType === 3) container = container.parentNode;
                const richInput = container.closest('.rich-input');
                if (richInput) {
                    const range = document.createRange();
                    range.selectNodeContents(richInput);
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }

            document.execCommand(command, false, value);
            render();
        }

        window.onload = () => { 
            resetForm(); 
            Sortable.create(document.getElementById('sizeList'), { handle: '.handle', animation: 150, ghostClass: 'sortable-ghost', onEnd: render });
        };

        function showLoading(show, msg) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = show ? 'flex' : 'none';
            if (show && msg) { const span = overlay.querySelector('span'); if (span) span.textContent = msg; }
        }
        function toggleChk(id) { const el = document.getElementById(id), lbl = document.getElementById('lbl-' + id); if(lbl) lbl.classList.toggle('active', el.checked); }

        function resetForm() {
            ['vTitle', 'vUnit', 'vVendor', 'vStyle', 'vColor', 'vDetail', 'vDate', 'vFooter', 'vYear', 'vWorkOrder', 'vCutDate', 'vNoteHeader', 'vSizeDesc', 'vFabric', 'vItem', 'vSales', 'vDesigner', 'vWorkNote'].forEach(id => { document.getElementById(id).value = (id === 'vTitle') ? '製單' : ''; });
            document.getElementById('cHeader').value = '#000000'; document.getElementById('cDetail').value = '#000000'; document.getElementById('cFooter').value = '#ff0000';
            document.getElementById('bHeader').checked = false; toggleChk('bHeader'); document.getElementById('bDetail').checked = false; toggleChk('bDetail'); document.getElementById('bFooter').checked = true; toggleChk('bFooter');
            selectPackagingSilent('一般');
            document.querySelector('input[name="tableMode"][value="qty"]').checked = true;
            setTableModeSilent('qty');
            imgList = []; selectedImgId = null; logoData = null; document.getElementById('imgInput').value = ''; document.getElementById('logoInput').value = '';
            document.getElementById('sizeList').innerHTML = ''; addSize(); render();
            hasUnsavedChanges = false;
        }
        // 不觸發render()的表格模式設定(供resetForm/loadProject內部使用，避免重複渲染)
        function setTableModeSilent(mode) {
            tableMode = mode;
            document.getElementById('lbl-mode-qty').classList.toggle('active', mode === 'qty');
            document.getElementById('lbl-mode-roster').classList.toggle('active', mode === 'roster');
            document.getElementById('lbl-mode-combo').classList.toggle('active', mode === 'combo');
            document.getElementById('workNoteWrap').style.display = mode === 'roster' ? 'block' : 'none';
        }
        // 不觸發render()的包裝方式設定(供resetForm/loadProject內部使用，避免重複渲染)
        function selectPackagingSilent(value) {
            const r1 = document.querySelector('input[name="vPackaging"][value="一般"]'), r2 = document.querySelector('input[name="vPackaging"][value="禾田專用"]');
            if (r1) r1.checked = (value !== '禾田專用'); if (r2) r2.checked = (value === '禾田專用');
            document.getElementById('lbl-pack1').classList.toggle('active', value !== '禾田專用');
            document.getElementById('lbl-pack2').classList.toggle('active', value === '禾田專用');
        }
        function getPackagingValue() { const el = document.querySelector('input[name="vPackaging"]:checked'); return el ? el.value : '一般'; }

        function loadLogo(input) { if(input.files && input.files[0]) { const r = new FileReader(); r.onload = e => { logoData = e.target.result; render(); }; r.readAsDataURL(input.files[0]); } }
        function clearLogo() { logoData = null; document.getElementById('logoInput').value = ''; render(); }

        // 新增示意圖：可一次選取多張圖片，每張都會量測原始尺寸，預設等比縮到示意圖框內置中顯示，之後可再自由拖曳/縮放
        function loadImg(input) {
            if (!input.files || !input.files.length) return;
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const src = e.target.result;
                    const probe = new Image();
                    probe.onload = () => {
                        const naturalW = probe.naturalWidth || 1, naturalH = probe.naturalHeight || 1;
                        const fitScale = Math.min(IMG_BOX_TRUE_W / naturalW, IMG_BOX_TRUE_H / naturalH, 1);
                        const w = naturalW * fitScale, h = naturalH * fitScale;
                        const offset = (imgList.length % 6) * 14; // 新圖片之間稍微錯開位置，避免完全疊在一起看不到
                        const item = { id: nextImgId++, src, x: (IMG_BOX_TRUE_W - w) / 2 + offset, y: (IMG_BOX_TRUE_H - h) / 2 + offset, scale: fitScale, naturalW, naturalH };
                        imgList.push(item); selectedImgId = item.id; render();
                    };
                    probe.src = src;
                };
                reader.readAsDataURL(file);
            });
            input.value = '';
        }
        function deleteImgItem(id) { imgList = imgList.filter(it => it.id !== id); if (selectedImgId === id) selectedImgId = null; render(); }
        function clearAllImg() { imgList = []; selectedImgId = null; document.getElementById('imgInput').value = ''; render(); }


        function addSize(sHtml='', q='', rHtml='', q2='', r2Html='', nameHtml='', numVal='', size1Html='', size2Html='') {
            const isRoster = tableMode === 'roster';
            const div = document.createElement('div'); div.className = 'size-item';
            if (tableMode === 'combo') {
                div.innerHTML = `
                    <div class="size-row-top">
                        <i class="fas fa-grip-vertical handle" title="按住拖曳"></i>

                        <div class="inp-name rich-input" contenteditable="true" data-placeholder="姓名" oninput="render()">${nameHtml}</div>
                        <input class="inp-num" type="number" value="${numVal}" placeholder="背號(選填)" oninput="render()">
                        <div class="inp-size1 rich-input" contenteditable="true" data-placeholder="衣尺寸" oninput="render()">${size1Html}</div>
                        <div class="inp-size2 rich-input" contenteditable="true" data-placeholder="褲尺寸" oninput="render()">${size2Html}</div>

                        <div class="color-circle" style="width:26px; height:26px; border-radius:4px; border:1px solid #cbd5e1; box-shadow:none;" title="選色">
                            <input type="color" onchange="applyFormatToSelection('foreColor', this.value)">
                        </div>
                        <button class="btn-mini btn-mini-bold" onmousedown="event.preventDefault(); applyFormatToSelection('bold')" title="加粗">B</button>
                        <button class="btn-mini btn-mini-del" onclick="this.closest('.size-item').remove(); render()" title="刪除此列">×</button>
                    </div>
                `;
                document.getElementById('sizeList').appendChild(div);
                render();
                return;
            }
            div.innerHTML = `
                <div class="size-row-top">
                    <i class="fas fa-grip-vertical handle" title="按住拖曳"></i>
                    
                    <div class="inp-s rich-input" contenteditable="true" data-placeholder="尺碼" oninput="render()">${sHtml}</div>
                    <input class="inp-q" type="number" value="${q}" placeholder="${isRoster ? '號碼①' : '數量'}" oninput="render()">
                    
                    <div style="flex:1"></div> 
                    <div class="color-circle" style="width:26px; height:26px; border-radius:4px; border:1px solid #cbd5e1; box-shadow:none;" title="選色">
                        <input type="color" onchange="applyFormatToSelection('foreColor', this.value)">
                    </div>
                    <button class="btn-mini btn-mini-bold" onmousedown="event.preventDefault(); applyFormatToSelection('bold')" title="加粗">B</button>
                    <button class="btn-mini btn-mini-del" onclick="this.closest('.size-item').remove(); render()" title="刪除此列">×</button>
                </div>
                <div class="inp-r rich-input" contenteditable="true" data-placeholder="${isRoster ? '姓名① (反白文字或點入框內，按右上角改色/加粗)...' : '備註內容 (反白文字或點入框內，按右上角改色/加粗)...'}" oninput="render()">${rHtml}</div>
                <div class="size-row-pair2" style="${isRoster ? '' : 'display:none;'}">
                    <span class="pair2-tag">同列<br>第2位</span>
                    <input class="inp-q2" type="number" value="${q2}" placeholder="號碼②" oninput="render()">
                    <div class="inp-r2 rich-input" contenteditable="true" data-placeholder="姓名② (選填，同一列可再放一位，充分利用空間)..." oninput="render()">${r2Html}</div>
                </div>
            `;
            document.getElementById('sizeList').appendChild(div);
            render();
        }

        function render() {
            hasUnsavedChanges = true; // 任何內容變動都視為尚未存檔，載入/重置流程結束後會再重設為 false
            const getVal = id => document.getElementById(id).value;
            const getChk = id => document.getElementById(id).checked;
            const styles = {
                title: { color: getVal('cTitle'), bold: getChk('bTitle') }, header: { color: getVal('cHeader'), bold: getChk('bHeader') },
                detail: { color: getVal('cDetail'), bold: getChk('bDetail') }, footer: { color: getVal('cFooter'), bold: getChk('bFooter') }
            };
            const data = {
                title: (getVal('vTitle') || ' ') + (getVal('vYear') || ''),
                unit: getVal('vUnit') || ' ', vendor: getVal('vVendor') || ' ',
                style: getVal('vStyle') || ' ', color: getVal('vColor') || ' ', detail: getVal('vDetail') || ' ', date: getVal('vDate'),
                workOrder: getVal('vWorkOrder') || ' ', cutDate: getVal('vCutDate') || ' ', noteHeader: getVal('vNoteHeader') || ' ',
                sizeDesc: getVal('vSizeDesc') || ' ', fabric: getVal('vFabric') || ' ', item: getVal('vItem') || ' ',
                sales: getVal('vSales') || ' ', designer: getVal('vDesigner') || ' ', packaging: getPackagingValue(),
                workNote: getVal('vWorkNote') || ' ',
                footer: getVal('vFooter') || ' ', rows: []
            };

            let total = 0;
            document.querySelectorAll('.size-item').forEach(row => {
                if (tableMode === 'combo') {
                    const nameEl = row.querySelector('.inp-name'), numEl = row.querySelector('.inp-num'), s1El = row.querySelector('.inp-size1'), s2El = row.querySelector('.inp-size2');
                    if (!nameEl) return; // 保險：避免混到其他模式結構的舊列
                    const name = nameEl.innerHTML, num = numEl.value, size1 = s1El.innerHTML, size2 = s2El.innerHTML;
                    const nameText = nameEl.textContent.trim(), size1Text = s1El.textContent.trim(), size2Text = s2El.textContent.trim();
                    if (nameText || num || size1Text || size2Text || name.includes('<img')) {
                        data.rows.push({ name, num, size1, size2 });
                        total += 1; // 背號同樣只是選填的識別碼，不是數量，合計算「訂製人數」
                    }
                    return;
                }
                const s = row.querySelector('.inp-s').innerHTML;
                const q = row.querySelector('.inp-q').value;
                const r = row.querySelector('.inp-r').innerHTML;
                const q2El = row.querySelector('.inp-q2'), r2El = row.querySelector('.inp-r2');
                const q2 = q2El ? q2El.value : '';
                const r2 = r2El ? r2El.innerHTML : '';
                const sText = row.querySelector('.inp-s').textContent.trim();
                const rText = row.querySelector('.inp-r').textContent.trim();
                const r2Text = r2El ? r2El.textContent.trim() : '';
                // 第1位：只要這一列有任何內容(尺碼/號碼/姓名/圖片)就算存在一件，即使沒背號、沒姓名，只填了尺碼也算1件
                const hasEntry1 = sText || q || rText || s.includes('<img') || r.includes('<img');
                // 第2位：完全獨立判斷，只要「號碼②」或「姓名②」任一有填，就視為同一列多算1件
                const hasEntry2 = q2 || r2Text || r2.includes('<img');

                if (hasEntry1 || hasEntry2) { 
                    data.rows.push({ s, q, r, q2, r2 }); 
                    if (tableMode === 'roster') {
                        // 名單細項模式：號碼是背號(球員編號)，不是數量，合計要算「人數/件數」而不是加總背號
                        if (hasEntry1) total += 1;
                        if (hasEntry2) total += 1;
                    } else {
                        // 尺寸/數量模式：這裡的數字才是真正的件數，合計照樣加總
                        if (q && !isNaN(q)) total += parseInt(q);
                    }
                }
            });

            const area = document.getElementById('previewArea'); area.innerHTML = ''; 
            let pages = []; let remainingRows = [...data.rows];
            pages.push({ type: 'first', rows: remainingRows.splice(0, ROWS_PAGE1) });
            while(remainingRows.length > 0) pages.push({ type: 'other', rows: remainingRows.splice(0, ROWS_PAGE_N) });

            const badgeText = document.getElementById('pageBadgeText');
            if (badgeText) badgeText.textContent = `共 ${pages.length} 頁`;

            // 產生單張示意圖的HTML(可拖曳/縮放版本，用於第一頁的示意圖框)
            function buildImgItemHtml(item) {
                const w = item.naturalW * item.scale, h = item.naturalH * item.scale;
                const sel = item.id === selectedImgId ? ' selected' : '';
                return `<div class="img-item${sel}" data-id="${item.id}" style="left:${item.x}px; top:${item.y}px; width:${w}px; height:${h}px;">
                    <img src="${item.src}" draggable="false">
                    <div class="img-delete-btn" title="刪除">×</div>
                    <div class="img-resize-handle" title="拖曳縮放"></div>
                </div>`;
            }

            pages.forEach((page, idx) => {
                const sheet = document.createElement('div'); sheet.className = 'sheet';
                let html = '';
                if (page.type === 'first' && logoData) html += `<div class="logo-area"><img src="${logoData}"></div>`;
                const titleText = page.type === 'first' ? data.title : `${data.title} (續頁)`;
                html += `<div class="sheet-header"><h1 class="sheet-title" style="color:${styles.title.color}; font-weight:${styles.title.bold?'bold':'normal'}">${titleText}</h1></div>`;
                
                if (page.type === 'first') {
                    const hStyle = `color:${styles.header.color}; font-weight:${styles.header.bold?'bold':'normal'};`;
                    const packChecked = (v) => data.packaging === v ? '☑' : '☐';
                    html += `<div class="info-grid-v2">
                        <div class="grid-cell cell-label"><div class="cell-stack"><span>版號</span><span>工單號</span></div></div>
                        <div class="grid-cell" style="${hStyle}"><div class="cell-stack"><span>${data.style}</span><span>${data.workOrder}</span></div></div>
                        <div class="grid-cell cell-label"><div class="cell-stack"><span>裁片</span><span>日期</span></div></div><div class="grid-cell" style="${hStyle}">${data.cutDate}</div>
                        <div class="grid-cell cell-label"><div class="cell-stack"><span>交貨</span><span>日期</span></div></div><div class="grid-cell" style="${hStyle}">${data.date}</div>
                        <div class="grid-cell cell-label">備註</div><div class="grid-cell" style="${hStyle}">${data.noteHeader}</div>

                        <div class="grid-cell cell-label"><div class="cell-stack"><span>客戶</span><span>單位</span></div></div><div class="grid-cell" style="${hStyle}">${data.unit}</div>
                        <div class="grid-cell cell-label"><div class="cell-stack"><span>尺寸標</span><span>說明</span></div></div><div class="grid-cell" style="${hStyle}">${data.sizeDesc}</div>
                        <div class="grid-cell cell-label">布料</div><div class="grid-cell" style="${hStyle}">${data.fabric}</div>
                        <div class="grid-cell cell-label"><div class="cell-stack"><span>車縫</span><span>單位</span></div></div><div class="grid-cell" style="${hStyle}">${data.vendor}</div>

                        <div class="grid-cell cell-label">品項</div><div class="grid-cell" style="${hStyle}">${data.item}</div>
                        <div class="grid-cell cell-label">顏色</div><div class="grid-cell" style="${hStyle}">${data.color}</div>
                        <div class="grid-cell" style="${hStyle} grid-column: span 2; justify-content:flex-start; text-align:left;"><div class="cell-stack"><span>業務：${data.sales}</span><span>美編：${data.designer}</span></div></div>
                        <div class="grid-cell cell-label">包裝</div><div class="grid-cell"><div class="cell-stack"><span class="pack-check">${packChecked('一般')} 一般</span><span class="pack-check">${packChecked('禾田專用')} 禾田專用</span></div></div>
                    </div><div style="font-weight:bold; margin-bottom:5px;">示意圖/裁片圖：</div>
                    <div class="img-area">${imgList.length ? imgList.map(buildImgItemHtml).join('') : `<span class="img-placeholder">圖稿預覽</span>`}</div>`;
                    const dStyle = `color:${styles.detail.color}; font-weight:${styles.detail.bold?'bold':'normal'}`;
                    html += `<div style="font-weight:bold; margin-bottom:5px;">製作說明：</div>
                    <div class="detail-area"><div class="detail-text" style="${dStyle}; width:100%;">${data.detail}</div></div>`;
                } else {
                    html += `<div style="margin-bottom:10px; font-size:14px; color:#666;">版號：${data.style} / 顏色：${data.color}</div>`;
                    if (imgList.length) {
                        const r = 120 / IMG_BOX_TRUE_H; // 續頁的小圖框比正式示意圖框矮，依比例縮小顯示(僅供參考、不可互動)
                        const smallHtml = imgList.map(item => {
                            const w = item.naturalW * item.scale * r, h = item.naturalH * item.scale * r, x = item.x * r, y = item.y * r;
                            return `<img src="${item.src}" style="position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${h}px; object-fit:contain;">`;
                        }).join('');
                        html += `<div class="img-area-small">${smallHtml}</div>`;
                    }
                }

                const emptyPlaceholderRow = tableMode === 'combo' ? {name:'',num:'',size1:'',size2:''} : {s:'',q:'',r:'',q2:'',r2:''};
                const rowsToShow = (page.rows.length === 0 && page.type === 'first') ? [emptyPlaceholderRow] : page.rows;
                if (tableMode === 'roster') {
                    html += `<table class="order-table"><thead><tr><th width="9%">尺寸</th><th width="10%" class="th-orange">號碼</th><th width="15%">姓名</th><th width="10%" class="th-orange">號碼</th><th width="15%">姓名</th><th>做工說明</th></tr></thead><tbody>`;
                    rowsToShow.forEach((r, i) => {
                        html += `<tr><td>${r.s}</td><td>${r.q}</td><td style="text-align:left; padding-left:8px;">${r.r}</td><td>${r.q2||''}</td><td style="text-align:left; padding-left:8px;">${r.r2||''}</td>`;
                        if (i === 0) html += `<td rowspan="${rowsToShow.length}" style="text-align:left; padding-left:8px; white-space:pre-wrap; vertical-align:top;">${data.workNote}</td>`;
                        html += `</tr>`;
                    });
                    if (idx === pages.length - 1) {
                        html += `<tfoot><tr><td style="font-weight:bold; background:#eee;">合計</td><td colspan="4" style="font-weight:bold; background:#eee;">${total > 0 ? total : ''}</td><td style="font-weight:bold; background:#eee;"></td></tr></tfoot>`;
                    }
                    html += `</tbody></table>`;
                } else if (tableMode === 'combo') {
                    html += `<table class="order-table"><thead><tr><th width="30%">姓名</th><th width="18%" class="th-orange">背號</th><th width="26%">衣尺寸</th><th width="26%">褲尺寸</th></tr></thead><tbody>`;
                    rowsToShow.forEach(r => { html += `<tr><td style="text-align:left; padding-left:8px;">${r.name}</td><td>${r.num}</td><td>${r.size1}</td><td style="text-align:center;">${r.size2}</td></tr>`; });
                    if (idx === pages.length - 1) {
                        html += `<tfoot><tr><td style="font-weight:bold; background:#eee;">合計</td><td colspan="3" style="font-weight:bold; background:#eee; text-align:center;">${total > 0 ? total + ' 人' : ''}</td></tr></tfoot>`;
                    }
                    html += `</tbody></table>`;
                } else {
                    html += `<table class="order-table"><thead><tr><th width="15%">尺寸</th><th width="15%">數量</th><th width="5%"></th><th>備註 / 確認</th></tr></thead><tbody>`;
                    rowsToShow.forEach(r => { html += `<tr><td>${r.s}</td><td>${r.q}</td><td></td><td>${r.r}</td></tr>`; });
                    if (idx === pages.length - 1) {
                        const fStyle = `color:${styles.footer.color}; font-weight:${styles.footer.bold?'bold':'normal'}`;
                        html += `<tfoot><tr><td style="font-weight:bold; background:#eee;">總計</td><td style="font-weight:bold;">${total > 0 ? total : ''}</td><td></td><td style="${fStyle}">${data.footer}</td></tr></tfoot>`;
                    }
                    html += `</tbody></table>`;
                }
                html += `<div class="page-num">Page ${idx+1} / ${pages.length}</div>`;
                sheet.innerHTML = html;
                const wrap = document.createElement('div'); wrap.className = 'sheet-wrap';
                wrap.appendChild(sheet); area.appendChild(wrap);

                if (page.type === 'first') {
                    const boxEl = sheet.querySelector('.img-area');
                    if (boxEl) attachImgAreaHandlers(boxEl);
                }
            });

            renderImgThumbList();

            // 新增/移除頁面(尤其是尺寸太多自動產生第二頁)後，等瀏覽器真正排版完成再量測寬度，避免用到舊的、還沒更新的尺寸導致縮放比例算錯、預覽跑版
            requestAnimationFrame(() => requestAnimationFrame(updateMobileScale));
        }

        // --- 示意圖：側邊欄縮圖清單(方便在手機上也能一眼看到、快速刪除) ---
        function renderImgThumbList() {
            const list = document.getElementById('imgThumbList');
            if (!list) return;

        // --- 示意圖：拖曳移動 + 拖角落把手縮放 + 點擊刪除，滑鼠/觸控通用(Pointer Events) ---
        function attachImgAreaHandlers(boxEl) {
            boxEl.querySelectorAll('.img-item').forEach(itemEl => {
                const id = parseInt(itemEl.dataset.id);
                const item = imgList.find(i => i.id === id);

            });

        function selectImgItem(itemEl, boxEl, id) {
            boxEl.querySelectorAll('.img-item.selected').forEach(el => el.classList.remove('selected'));
            itemEl.classList.add('selected'); selectedImgId = id;

        function setupImageDragResize(itemEl, item, boxEl) {
            let mode = null, startX = 0, startY = 0, startLeft = 0, startTop = 0, startW = 0;

            itemEl.addEventListener('pointerdown', (e) => {
                if (e.target.classList.contains('img-resize-handle') || e.target.classList.contains('img-delete-btn')) return;
                mode = 'drag'; itemEl.setPointerCapture(e.pointerId);
                selectImgItem(itemEl, boxEl, item.id);
                startX = e.clientX; startY = e.clientY; startLeft = item.x; startTop = item.y;
                e.preventDefault(); e.stopPropagation();
            });
            itemEl.addEventListener('pointermove', (e) => {
                if (mode !== 'drag') return;
                const dx = (e.clientX - startX) / currentMobileScale, dy = (e.clientY - startY) / currentMobileScale;
                item.x = startLeft + dx; item.y = startTop + dy;
                itemEl.style.left = item.x + 'px'; itemEl.style.top = item.y + 'px';
            });
            const endInteraction = () => { if (mode) { mode = null; hasUnsavedChanges = true; } };
            itemEl.addEventListener('pointerup', endInteraction);
            itemEl.addEventListener('pointercancel', endInteraction);

            const handle = itemEl.querySelector('.img-resize-handle');
            handle.addEventListener('pointerdown', (e) => {
                mode = 'resize'; handle.setPointerCapture(e.pointerId);
                selectImgItem(itemEl, boxEl, item.id);
                startX = e.clientX; startW = item.naturalW * item.scale;
                e.preventDefault(); e.stopPropagation();
            });
            handle.addEventListener('pointermove', (e) => {
                if (mode !== 'resize') return;
                const dx = (e.clientX - startX) / currentMobileScale;
                const newW = Math.max(20, startW + dx);
                item.scale = Math.max(0.05, newW / item.naturalW);
                const w = item.naturalW * item.scale, h = item.naturalH * item.scale;
                itemEl.style.width = w + 'px'; itemEl.style.height = h + 'px';
            });
            handle.addEventListener('pointerup', endInteraction);
            handle.addEventListener('pointercancel', endInteraction);

            const delBtn = itemEl.querySelector('.img-delete-btn');
            delBtn.addEventListener('pointerdown', (e) => { e.stopPropagation(); });
            delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteImgItem(item.id); });
        }
